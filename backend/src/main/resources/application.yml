server:
  port: ${PORT:9090}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        same-site: none
        secure: true
        http-only: true
      timeout: 30m

spring:
  application:
    name: consult-america-hr-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://consult-america-hr-nine.vercel.app,http://localhost:4200}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${SMTP_FROM:no-reply@consultamerica-hr.example}
  frontend-url: ${FRONTEND_URL:https://consult-america-hr-nine.vercel.app}

logging:
  level:
    org.springframework.security: INFO
