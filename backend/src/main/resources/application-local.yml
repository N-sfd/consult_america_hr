spring:
  datasource:
    url: jdbc:h2:mem:hrdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

server:
  servlet:
    session:
      cookie:
        same-site: lax
        secure: false
