services:
  - type: web
    name: consult-america-hr-api
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://consult-america-hr-nine.vercel.app,http://localhost:4200
      - key: FRONTEND_URL
        value: https://consult-america-hr-nine.vercel.app
      - key: MAIL_ENABLED
        value: "false"
      - key: JPA_DDL_AUTO
        value: update
